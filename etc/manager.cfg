#config for this applications manager
# no spaces between values

# Normal - release config, network set up enirely based on peer_ips.cfg
# TestMode_Local_ShmOnly - force all nodes to use shared memory only (fails if nodes are not on the same machine)
# TestMode_Local_SocketOnly - force all nodes to use sockets only
# TestMode_Sim_Network - force one half of nodes to shm and other half to socket
mode=TestMode_Sim_Network

# multicast configuration for udp broadcast (label discovery)
mcast_group_ip=239.255.0.1
mcast_port=30001
mcast_bind_ip=0.0.0.0
mcast_ttl=1
mcast_loopback=true
mcast_reuse_addr=true